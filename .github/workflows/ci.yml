name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  backend:
    name: Backend (Python / FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff
      - name: Lint (ruff)
        run: ruff check . --select S608
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Tests (pytest)
        run: pytest -q

  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zhiwei-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Dependency audit
        run: npm audit --omit=dev
